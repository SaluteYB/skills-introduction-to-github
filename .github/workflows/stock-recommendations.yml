name: 📈 Daily Stock Pick — TikTok FinTok 热榜

on:
  # 每天 22:06 UTC = 北京时间 06:06 AM（对齐图中设置）
  schedule:
    - cron: "6 22 * * *"
  # 手动触发，方便测试
  workflow_dispatch:

jobs:
  stock-report:
    name: 抓取 TikTok 热榜 → 技术分析 → 发送邮件
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install yfinance requests

      - name: 运行推荐脚本并发送邮件
        env:
          EMAIL_FROM:     ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
        run: python scripts/stock_recommendations.py
