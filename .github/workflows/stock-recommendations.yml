name: 📈 Daily Stock Pick — TikTok FinTok 热榜

on:
  # 每天 22:06 UTC = 北京时间 06:06 AM（对齐图中设置）
  schedule:
    - cron: "6 22 * * *"
  # 手动触发，方便测试
  workflow_dispatch:

jobs:
  stock-report:
    name: 抓取 TikTok 热榜 → 技术分析 → 推送报告
    runs-on: ubuntu-latest
    permissions:
      issues: write   # 允许创建 Issue
      contents: read

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install yfinance requests

      - name: 运行推荐脚本
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/stock_recommendations.py

      - name: 确保 Issue 标签存在
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "stock-report" --color "0075ca" --description "自动生成的美股推荐报告" --force
          gh label create "automated"    --color "e4e669" --description "由 GitHub Actions 自动创建" --force
